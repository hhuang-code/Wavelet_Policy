defaults:
  - _self_
  - encoder: identity
  - action_ae: discretizers/k_means_kitchen_best
  - env: relay_kitchen_traj
  - state_prior: mingpt_kitchen_best
  - env_vars: env_vars

lazy_init_models: True

# Model details
n_layer: 6
converter: id # id, mlp, conv, attn
scaler: id # id, mlp, conv, attn

dct_percentage: 0.2

# Dataset details
train_fraction: 0.95
batch_size: 64
num_workers: 4
window_size: 10

# Training details
num_training_epochs: 1
data_parallel: False
device: cuda
optim: Adam
save_latents: False

lr: 1e-4
weight_decay: 0.1
betas:
  - 0.9
  - 0.95
grad_norm_clip: 1.0
seed: 42  # 31, 42, 53

# Wavelet loss config
detail_loss_weight: 0.1
smooth_loss_weight: 0.1

# Prior training details
num_prior_epochs: 50
eval_prior_every: 1
save_prior_every: 1

# Logging frequency
eval_every: 1
save_every: 1

# Wandb config
project: behavior_transformer_repro_test
experiment: kitchen_train

hydra:
  job:
    override_dirname: ${experiment}
  run:
    dir: ./exp_local/${now:%Y.%m.%d}/${now:%H%M%S}_${experiment}_layer${n_layer}_ws${window_size}_${converter}_${scaler}_seed${seed}_dw${detail_loss_weight}_sw${smooth_loss_weight}
#    dir: ./exp_local/${now:%Y.%m.%d}/${now:%H%M%S}_${experiment}_layer${n_layer}_ws${window_size}_seed${seed}
  sweep:
    dir: ./exp/${now:%Y.%m.%d}/${now:%H%M}_${experiment}
    subdir: ${hydra.job.num}
